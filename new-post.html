<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Post</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="glass-header">
        <h1 class="site-title">Daily Blog</h1>
        <nav>
            <a href="index.html" class="glass-btn">Home</a>
            <a href="new-post.html" class="glass-btn">New Post</a>
        </nav>
    </header>
    <main class="form-wrapper">
        <form id="new-post-form" class="glass-form">
            <label>Title
                <input type="text" name="title" required>
            </label>
            <label>Content
                <textarea name="content" rows="10" required></textarea>
            </label>
            <button type="submit" class="glass-btn large">Submit</button>
        </form>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
